name: NexusStats
version: 1.0.0
main: at.nexus.stats.NexusStats
api-version: '1.21'
description: Economy und Scoreboard fuer NexusSMP
authors: [NexusSMP]

commands:
  balance:
    description: Kontostand anzeigen
    aliases: [bal, money]
  pay:
    description: Geld an einen Spieler senden
    usage: /pay <Spieler> <Betrag>
  baltop:
    description: Die reichsten Spieler
  eco:
    description: Economy verwalten
    usage: /eco <give|take|set> <Spieler> <Betrag>
    permission: nexus.eco.admin

permissions:
  nexus.eco.admin:
    description: Zugriff auf /eco
    default: op
